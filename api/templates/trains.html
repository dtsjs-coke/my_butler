{% extends "base.html" %}

{% block page_title %}SRT 열차 예약{% endblock %}

{% block content %}
<div class="space-y-8" id="srt-app">
    <!-- Step 1: 역 선택 -->
    <section id="step-1" class="space-y-6">
        <h2 class="text-2xl font-bold">1단계: 어디로 가시나요?</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 출발역 -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">출발역</label>
                <select id="dep-station" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">출발역 선택</option>
                    {% for station in stations %}
                    <option value="{{ station }}">{{ station }}</option>
                    {% endfor %}
                </select>
            </div>
            <!-- 도착역 -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">도착역</label>
                <select id="arr-station" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="">도착역 선택</option>
                    {% for station in stations %}
                    <option value="{{ station }}">{{ station }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <button type="button" onclick="nextStep(2)" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
            다음: 날짜 및 시간 선택 <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
    </section>

    <!-- Step 2: 날짜 및 시간 선택 -->
    <section id="step-2" class="hidden space-y-6">
        <div class="flex items-center gap-4">
            <button type="button" onclick="prevStep(1)" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-2xl font-bold">2단계: 언제 출발하시나요?</h2>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">출발 일자</label>
                <input type="date" id="srt-date" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">출발 시간 (이후)</label>
                <select id="srt-time" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="000000">00:00</option>
                    <option value="020000">02:00</option>
                    <option value="040000">04:00</option>
                    <option value="060000">06:00</option>
                    <option value="080000" selected>08:00</option>
                    <option value="100000">10:00</option>
                    <option value="120000">12:00</option>
                    <option value="140000">14:00</option>
                    <option value="160000">16:00</option>
                    <option value="180000">18:00</option>
                    <option value="200000">20:00</option>
                    <option value="220000">22:00</option>
                </select>
            </div>
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">조회 시간 한도 (hhmmss)</label>
                <input type="text" id="srt-time-limit" placeholder="예: 235959" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                <p class="text-[10px] text-gray-400 mt-2">* 입력한 시간 이전 열차만 조회합니다.</p>
            </div>
        </div>
        <button type="button" onclick="nextStep(3)" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl hover:bg-blue-700 transition-all flex items-center justify-center gap-2">
            다음: 인원 및 옵션 설정 <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
    </section>

    <!-- Step 3: 인원 및 옵션 설정 -->
    <section id="step-3" class="hidden space-y-6">
        <div class="flex items-center gap-4">
            <button type="button" onclick="prevStep(2)" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </button>
            <h2 class="text-2xl font-bold">3단계: 누구와 어떻게 가시나요?</h2>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white dark:bg-dark-card p-4 rounded-xl border border-gray-200 dark:border-dark-border">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">어른</label>
                <input type="number" id="count-adult" value="1" min="0" max="9" class="w-full px-3 py-2 bg-gray-50 dark:bg-dark-bg rounded-lg outline-none">
            </div>
            <div class="bg-white dark:bg-dark-card p-4 rounded-xl border border-gray-200 dark:border-dark-border">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">어린이</label>
                <input type="number" id="count-child" value="0" min="0" max="9" class="w-full px-3 py-2 bg-gray-50 dark:bg-dark-bg rounded-lg outline-none">
            </div>
            <div class="bg-white dark:bg-dark-card p-4 rounded-xl border border-gray-200 dark:border-dark-border">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">경로(65세+)</label>
                <input type="number" id="count-senior" value="0" min="0" max="9" class="w-full px-3 py-2 bg-gray-50 dark:bg-dark-bg rounded-lg outline-none">
            </div>
            <div class="bg-white dark:bg-dark-card p-4 rounded-xl border border-gray-200 dark:border-dark-border">
                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2">장애인</label>
                <input type="number" id="count-disability" value="0" min="0" max="9" class="w-full px-3 py-2 bg-gray-50 dark:bg-dark-bg rounded-lg outline-none">
            </div>
        </div>

        <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm space-y-4">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">좌석 옵션</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="seat-type" class="w-full px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl outline-none">
                    <option value="GENERAL_FIRST">일반실 우선</option>
                    <option value="GENERAL_ONLY">일반실 전용</option>
                    <option value="SPECIAL_FIRST">특실 우선</option>
                    <option value="SPECIAL_ONLY">특실 전용</option>
                </select>
                <label class="flex items-center gap-3 px-4 py-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl cursor-pointer">
                    <input type="checkbox" id="window-seat" class="w-4 h-4 text-blue-600 rounded">
                    <span class="text-sm font-medium">창가 자리 우선</span>
                </label>
            </div>
        </div>

        <button type="button" onclick="submitReservation()" id="btn-submit" class="w-full py-4 bg-orange-500 text-white font-bold rounded-2xl hover:bg-orange-600 shadow-lg shadow-orange-500/20 transition-all flex items-center justify-center gap-2">
            예약 대기열 등록 <i data-lucide="check-circle" class="w-5 h-5"></i>
        </button>
    </section>

    <!-- 현재 대기열 상태 -->
    <section class="mt-12">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold">현재 예약 대기 목록</h2>
            <button onclick="loadQueue()" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg text-gray-400" title="새로고침">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            </button>
        </div>
        <div id="queue-list" class="space-y-4">
            <p class="text-sm text-gray-400 italic">대기열을 불러오는 중...</p>
        </div>
    </section>
</div>

<script>
    let srtData = {
        dep: '', arr: '', date: '', time: '', time_limit: '',
        adult: 1, child: 0, senior: 0, disability: 0,
        seat_type: 'GENERAL_FIRST', window_seat: false
    };

    function nextStep(step) {
        if (step === 2) {
            srtData.dep = document.getElementById('dep-station').value;
            srtData.arr = document.getElementById('arr-station').value;
            if (!srtData.dep || !srtData.arr) {
                alert("출발역과 도착역을 모두 선택해주세요.");
                return;
            }
            if (srtData.dep === srtData.arr) {
                alert("출발역과 도착역은 달라야 합니다.");
                return;
            }
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('srt-date').value = today;
        }
        
        if (step === 3) {
            const rawDate = document.getElementById('srt-date').value;
            if (!rawDate) {
                alert("출발 일자를 선택해주세요.");
                return;
            }
            srtData.date = rawDate.replace(/-/g, '');
            srtData.time = document.getElementById('srt-time').value;
            srtData.time_limit = document.getElementById('srt-time-limit').value.trim() || null;
        }

        // UI 전환
        document.getElementById('step-1').classList.toggle('hidden', step !== 1);
        document.getElementById('step-2').classList.toggle('hidden', step !== 2);
        document.getElementById('step-3').classList.toggle('hidden', step !== 3);
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function prevStep(step) {
        nextStep(step);
    }

    async function submitReservation() {
        srtData.adult = parseInt(document.getElementById('count-adult').value) || 0;
        srtData.child = parseInt(document.getElementById('count-child').value) || 0;
        srtData.senior = parseInt(document.getElementById('count-senior').value) || 0;
        srtData.disability = parseInt(document.getElementById('count-disability').value) || 0;
        srtData.seat_type = document.getElementById('seat-type').value;
        srtData.window_seat = document.getElementById('window-seat').checked;

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerHTML = '<i class="animate-spin" data-lucide="loader"></i> 처리 중...';
        if(window.lucide) lucide.createIcons();

        try {
            const res = await fetch('/api/srt/reserve', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Butler-Token': BUTLER_API_TOKEN 
                },
                body: JSON.stringify(srtData)
            });
            const result = await res.json();
            if (result.status === 'success') {
                alert("성공! 예약 대기열에 등록되었습니다.");
                location.reload();
            } else {
                alert("실패: " + (result.reason || "알 수 없는 오류"));
                btn.disabled = false;
                btn.innerText = '예약 대기열 등록';
            }
        } catch (e) {
            console.error(e);
            alert("네트워크 오류가 발생했습니다.");
            btn.disabled = false;
            btn.innerText = '예약 대기열 등록';
        }
    }

    async function loadQueue() {
        try {
            const res = await fetch('/api/srt/queue', {
                headers: { 'X-Butler-Token': BUTLER_API_TOKEN }
            });
            const data = await res.json();
            const container = document.getElementById('queue-list');
            
            if (!data.queue || Object.keys(data.queue).length === 0) {
                container.innerHTML = '<p class="text-sm text-gray-400 italic">현재 진행 중인 예약 작업이 없습니다.</p>';
                return;
            }

            let html = '';
            for (const user in data.queue) {
                data.queue[user].forEach((task, idx) => {
                    const timeLabel = task.time ? task.time.substring(0,2) + ":" + task.time.substring(2,4) : "--:--";
                    const userLabel = user === 'WEB_USER' ? 'Web' : (task.user_name || 'Discord');
                    html += `
                        <div class="bg-white dark:bg-dark-card p-4 rounded-2xl border border-gray-200 dark:border-dark-border flex items-center justify-between shadow-sm transition-all hover:shadow-md">
                            <div class="flex items-center gap-4">
                                <div class="w-10 h-10 bg-orange-100 dark:bg-orange-900/30 text-orange-600 rounded-xl flex items-center justify-center">
                                    <i data-lucide="train"></i>
                                </div>
                                <div>
                                    <p class="text-sm font-bold">${task.dep} → ${task.arr}</p>
                                    <p class="text-[10px] text-gray-400">${task.date} ${timeLabel} | ${userLabel}</p>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="px-2 py-1 bg-blue-50 dark:bg-blue-900/20 text-blue-600 text-[10px] font-bold rounded-lg">${task.status || '대기'}</span>
                                <button onclick="deleteQueueTask('${user}', ${idx})" class="p-2 text-gray-400 hover:text-red-500 transition-colors" title="삭제">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }
            container.innerHTML = html;
            if(window.lucide) lucide.createIcons();
        } catch (e) { 
            console.error("Queue load failed", e);
            document.getElementById('queue-list').innerHTML = '<p class="text-xs text-red-400">대기열 로딩 실패</p>';
        }
    }

    async function deleteQueueTask(userId, taskIdx) {
        if (!confirm("이 예약 작업을 대기열에서 삭제하시겠습니까?")) return;
        try {
            const res = await fetch('/api/srt/queue', {
                method: 'DELETE',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Butler-Token': BUTLER_API_TOKEN 
                },
                body: JSON.stringify({ user_id: userId, index: taskIdx })
            });
            const result = await res.json();
            if (result.status === 'success') {
                loadQueue();
            } else {
                alert("삭제 실패: " + result.reason);
            }
        } catch (e) { alert("작업 삭제 중 오류가 발생했습니다."); }
    }

    // 초기화
    document.addEventListener('DOMContentLoaded', () => {
        // 오늘 날짜를 기본값으로 설정
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('srt-date').value = today;

        loadQueue();
        setInterval(loadQueue, 15000);

        // Graph View 초기화
        if (typeof initGraph === 'function') {
            setTimeout(initGraph, 1000);
        }
        
        if (window.lucide) lucide.createIcons();
    });
</script>
{% endblock %}
