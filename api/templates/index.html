{% extends "base.html" %}

{% block page_title %}Dashboard Home{% endblock %}

{% block content %}
<div class="space-y-8">
    <section>
        <h2 class="text-2xl font-bold mb-6">Welcome back, Butler Pro</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Status Card 1 -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="zap"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">System Status</h3>
                <p class="text-xl font-bold text-green-500 underline decoration-2 underline-offset-4">Healthy</p>
            </div>
            <!-- Status Card 2 -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="battery"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Device Battery</h3>
                <p class="text-xl font-bold">85% <span class="text-xs font-normal text-gray-400 ml-2">(Charging)</span></p>
            </div>
            <!-- Status Card 3 -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="activity"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Active Tasks</h3>
                <p class="text-xl font-bold">3 <span class="text-xs font-normal text-gray-400 ml-2">Running</span></p>
            </div>
        </div>
    </section>

    <section>
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold">Quick Actions</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button class="flex flex-col items-center justify-center p-8 bg-gray-100 dark:bg-dark-card rounded-2xl border-2 border-dashed border-gray-300 dark:border-dark-border hover:border-blue-500 transition-colors group">
                <i data-lucide="plus-circle" class="w-8 h-8 text-gray-400 group-hover:text-blue-500 mb-2"></i>
                <span class="text-sm font-medium">Add News Keyword</span>
            </button>
            <button class="flex flex-col items-center justify-center p-8 bg-gray-100 dark:bg-dark-card rounded-2xl border-2 border-dashed border-gray-300 dark:border-dark-border hover:border-blue-500 transition-colors group">
                <i data-lucide="train" class="w-8 h-8 text-gray-400 group-hover:text-blue-500 mb-2"></i>
                <span class="text-sm font-medium">SRT Reservation</span>
            </button>
        </div>
    </section>
</div>
{% endblock %}
