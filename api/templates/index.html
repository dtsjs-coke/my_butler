{% extends "base.html" %}

{% block page_title %}Dashboard Home{% endblock %}

{% block content %}
<div class="space-y-8">
    <section>
        <h2 class="text-2xl font-bold mb-6">Welcome back, Butler Pro</h2>
        
        <!-- Device Monitoring Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 1. Battery -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="battery"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Battery</h3>
                <p id="batt-status" class="text-xl font-bold">--% <span id="batt-extra" class="text-xs font-normal text-gray-400 ml-2">--</span></p>
            </div>

            <!-- 2. Temperature -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-red-100 dark:bg-red-900/30 text-red-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="thermometer"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">Device Temp</h3>
                <p id="sys-temp" class="text-xl font-bold text-gray-900 dark:text-gray-100">--°C</p>
            </div>

            <!-- 3. RAM Usage -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-purple-100 dark:bg-purple-900/30 text-purple-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="cpu"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">RAM Usage</h3>
                <p id="mem-status" class="text-xl font-bold">--% <span id="mem-extra" class="text-xs font-normal text-gray-400 ml-2">--</span></p>
            </div>

            <!-- 4. AP (CPU) Usage -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-orange-100 dark:bg-orange-900/30 text-orange-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="zap"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">AP Usage</h3>
                <p id="cpu-status" class="text-xl font-bold text-gray-900 dark:text-gray-100">--%</p>
            </div>

            <!-- 5. HDD (Storage) Usage -->
            <div class="bg-white dark:bg-dark-card p-6 rounded-2xl border border-gray-200 dark:border-dark-border shadow-sm">
                <div class="w-10 h-10 bg-green-100 dark:bg-green-900/30 text-green-600 rounded-lg flex items-center justify-center mb-4">
                    <i data-lucide="hard-drive"></i>
                </div>
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 mb-1">HDD Storage</h3>
                <p id="storage-status" class="text-xl font-bold">--% <span id="storage-extra" class="text-xs font-normal text-gray-400 ml-2">--</span></p>
            </div>
        </div>
    </section>

    <section>
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold">Quick Actions</h2>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button id="btn-manage-news" class="flex flex-col items-center justify-center p-8 bg-gray-100 dark:bg-dark-card rounded-2xl border-2 border-dashed border-gray-300 dark:border-dark-border hover:border-blue-500 transition-colors group">
                <i data-lucide="newspaper" class="w-8 h-8 text-gray-400 group-hover:text-blue-500 mb-2"></i>
                <span class="text-sm font-medium">Manage News</span>
            </button>
            <button class="flex flex-col items-center justify-center p-8 bg-gray-100 dark:bg-dark-card rounded-2xl border-2 border-dashed border-gray-300 dark:border-dark-border hover:border-blue-500 transition-colors group">
                <i data-lucide="train" class="w-8 h-8 text-gray-400 group-hover:text-blue-500 mb-2"></i>
                <span class="text-sm font-medium">SRT Reservation</span>
            </button>
        </div>
    </section>
</div>

<script>
    async function updateStatus() {
        try {
            const res = await fetch('/api/system_status', {
                headers: { 'X-Butler-Token': BUTLER_API_TOKEN }
            });
            const data = await res.json();
            
            // 1. Battery
            document.getElementById('batt-status').innerHTML = `${data.battery.percentage}% <span class="text-xs font-normal text-gray-400 ml-2">(${data.battery.status})</span>`;
            
            // 2. Temp
            document.getElementById('sys-temp').innerText = `${data.battery.temperature}°C`;
            
            // 3. RAM
            document.getElementById('mem-status').innerHTML = `${data.memory.percentage}% <span class="text-xs font-normal text-gray-400 ml-2">${data.memory.used}/${data.memory.total} MB</span>`;
            
            // 4. CPU (AP)
            document.getElementById('cpu-status').innerText = `${data.cpu.percentage}%`;
            
            // 5. Storage (HDD)
            document.getElementById('storage-status').innerHTML = `${data.storage.percentage}% <span class="text-xs font-normal text-gray-400 ml-2">${data.storage.used}/${data.storage.total}</span>`;
            
        } catch (e) {
            console.error("Status update failed", e);
        }
    }

    // 전역 함수로 선언하여 다른 페이지에서도 접근 가능하게 함
    window.handleManageNews = async function() {
        try {
            const res = await fetch('/api/keywords', {
                headers: { 'X-Butler-Token': BUTLER_API_TOKEN }
            });
            const data = await res.json();
            const keywords = data.keywords || [];

            const bodyHtml = `
                <div class="space-y-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">키워드 추가</label>
                        <div class="flex gap-2">
                            <input type="text" id="new-keyword" placeholder="예: 인공지능" class="flex-1 px-4 py-2 bg-gray-100 dark:bg-dark-card border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                            <button onclick="addKeywordAction()" class="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-700 transition-colors">추가</button>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">현재 트래킹 중인 키워드 (${keywords.length})</label>
                        <div class="max-h-48 overflow-y-auto space-y-2 pr-2 custom-scrollbar">
                            ${keywords.length > 0 ? keywords.map(kw => `
                                <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-dark-card/50 rounded-xl border border-gray-100 dark:border-dark-border">
                                    <span class="text-sm font-medium">${kw}</span>
                                    <button onclick="deleteKeywordAction('${kw}')" class="p-1.5 text-gray-400 hover:text-red-500 transition-colors">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            `).join('') : '<p class="text-sm text-gray-500 italic">등록된 키워드가 없습니다.</p>'}
                        </div>
                    </div>
                </div>
            `;
            
            openModal('뉴스 키워드 관리', bodyHtml);
        } catch (e) {
            alert("키워드 목록을 불러오는데 실패했습니다.");
        }
    };

    window.addKeywordAction = async function() {
        const input = document.getElementById('new-keyword');
        const keyword = input.value.trim();
        if (!keyword) return;

        try {
            const res = await fetch('/api/keywords', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Butler-Token': BUTLER_API_TOKEN 
                },
                body: JSON.stringify({ keyword })
            });
            const result = await res.json();
            if (result.status === 'success') {
                input.value = '';
                handleManageNews(); // UI 갱신
                if (typeof initGraph === 'function') initGraph();
            } else {
                alert("추가 실패: " + (result.reason || "알 수 없는 오류"));
            }
        } catch (e) { alert("서버 연결 에러"); }
    };

    window.deleteKeywordAction = async function(keyword) {
        if (!confirm(`'${keyword}' 키워드를 삭제하시겠습니까?`)) return;

        try {
            const res = await fetch('/api/keywords', {
                method: 'DELETE',
                headers: { 
                    'Content-Type': 'application/json',
                    'X-Butler-Token': BUTLER_API_TOKEN 
                },
                body: JSON.stringify({ keyword })
            });
            const result = await res.json();
            if (result.status === 'success') {
                handleManageNews(); // UI 갱신
                if (typeof initGraph === 'function') initGraph();
            } else {
                alert("삭제 실패: " + (result.reason || "알 수 없는 오류"));
            }
        } catch (e) { alert("서버 연결 에러"); }
    };

    // Manage News 버튼 클릭 이벤트
    document.getElementById('btn-manage-news').addEventListener('click', () => {
        handleManageNews();
    });

    updateStatus();
    setInterval(updateStatus, 30000); // 30초마다 갱신
</script>
{% endblock %}
