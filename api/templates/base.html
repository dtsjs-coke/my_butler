<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butler Pro Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#1a1b1e',
                            sidebar: '#25262b',
                            card: '#2c2e33',
                            border: '#373a40'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Vis.js for Graph View -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(37, 38, 43, 0.8); }
        #graph-view { height: 250px; width: 100%; }
        .toc-item.active { @apply text-blue-500 font-semibold; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div class="flex h-screen overflow-hidden">
        <!-- [LEFT] Sidebar -->
        <aside id="left-sidebar" class="w-64 flex-shrink-0 border-r border-gray-200 dark:border-dark-border bg-white dark:bg-dark-sidebar flex flex-col transition-all duration-300">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                        <i data-lucide="bot"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight">Butler Pro</h1>
                </div>

                <!-- Search -->
                <div class="relative mb-6">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </span>
                    <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-2 bg-gray-100 dark:bg-dark-card border-none rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()" class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors mb-6">
                    <div class="flex items-center gap-3">
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                        <span class="text-sm font-medium">테마 변경</span>
                    </div>
                    <div id="theme-indicator" class="w-2 h-2 rounded-full bg-blue-500"></div>
                </button>

                <!-- Navigation -->
                <nav class="space-y-1">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-3 mb-2">Pages</p>
                    <a href="/" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="home" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">Home</span>
                    </a>
                    <a href="/news" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="newspaper" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">News Room</span>
                    </a>
                    <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="settings" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">Settings</span>
                    </a>
                </nav>
            </div>
            
            <div class="mt-auto p-6 border-t border-gray-200 dark:border-dark-border">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500"></div>
                    <div>
                        <p class="text-xs font-bold">S9 Server</p>
                        <p class="text-[10px] text-green-500">Online</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- [MIDDLE] Main Content -->
        <main class="flex-1 overflow-y-auto relative bg-white dark:bg-dark-bg">
            <header class="sticky top-0 z-10 glass border-b border-gray-200 dark:border-dark-border px-8 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar('left-sidebar')" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg lg:hidden">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h2 class="text-lg font-semibold" id="page-title">{% block page_title %}Dashboard{% endblock %}</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleSidebar('right-sidebar')" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg">
                        <i data-lucide="layout-sidebar-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </header>

            <div class="max-w-4xl mx-auto px-8 py-12">
                {% block content %}{% endblock %}
            </div>
        </main>

        <!-- [RIGHT] Sidebar -->
        <aside id="right-sidebar" class="w-72 flex-shrink-0 border-l border-gray-200 dark:border-dark-border bg-white dark:bg-dark-sidebar flex flex-col transition-all duration-300">
            <div class="p-6 h-full flex flex-col">
                <div class="mb-8">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Graph View</h3>
                    <div id="graph-view" class="bg-gray-50 dark:bg-dark-card rounded-xl border border-gray-200 dark:border-dark-border">
                        <!-- Vis.js canvas will be here -->
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">On this page</h3>
                    <div id="toc-container" class="space-y-2 text-sm text-gray-500 dark:text-gray-400">
                        <!-- ToC items will be auto-generated -->
                        <p class="italic text-xs">No headings found</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // Init Lucide Icons
        lucide.createIcons();

        // Dark Mode Logic
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Sidebar Toggle
        function toggleSidebar(id) {
            const el = document.getElementById(id);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }

        // TOC Generator (Default: can be overridden by pages)
        function generateDefaultTOC() {
            const tocContainer = document.getElementById('toc-container');
            // If the page already provided its own TOC (like news.html), don't overwrite
            if (tocContainer && tocContainer.getAttribute('data-custom') === 'true') return;

            const content = document.querySelector('main div');
            const headings = content.querySelectorAll('h1, h2, h3');
            
            if (tocContainer && headings.length > 0) {
                tocContainer.innerHTML = '<p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4">On this page</p>';
                headings.forEach((h, index) => {
                    if (!h.id) h.id = 'heading-' + index;
                    const item = document.createElement('a');
                    item.href = '#' + h.id;
                    item.className = 'block hover:text-blue-500 transition-colors py-1 text-sm text-gray-500 dark:text-gray-400 pl-' + (h.tagName[1] === '3' ? '4' : '0');
                    item.innerText = h.innerText;
                    tocContainer.appendChild(item);
                });
            }
        }

        // Graph View Real Data
        async function initGraph() {
            const container = document.getElementById('graph-view');
            if (!container) return;
            try {
                const res = await fetch('/api/graph_data');
                const data = await res.json();
                
                const nodes = new vis.DataSet(data.nodes);
                const edges = new vis.DataSet(data.edges);
                
                const options = {
                    nodes: {
                        shape: 'dot',
                        size: 16,
                        font: { size: 10, color: '#999' },
                        borderWidth: 2
                    },
                    edges: { width: 1, color: '#ccc' },
                    physics: { 
                        enabled: true,
                        stabilization: { iterations: 150 }
                    }
                };
                new vis.Network(container, { nodes, edges }, options);
            } catch (e) {
                console.error("Graph data load failed", e);
            }
        }

        window.onload = () => {
            if (typeof initGraph === 'function') initGraph();
            if (typeof generateDefaultTOC === 'function') generateDefaultTOC();
        };
    </script>
</body>
</html>
