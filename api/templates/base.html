<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butler Pro Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#1a1b1e',
                            sidebar: '#25262b',
                            card: '#2c2e33',
                            border: '#373a40'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Vis.js for Graph View -->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(37, 38, 43, 0.8); }
        #graph-view { height: 250px; width: 100%; }
        
        /* Mobile Overlay Background */
        .sidebar-overlay {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 40;
        }

        /* Custom Transition */
        .sidebar-transition {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Prevent body scroll when sidebar open on mobile */
        .overflow-hidden-mobile {
            @media (max-width: 1024px) {
                overflow: hidden;
            }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" onclick="closeAllSidebars()" class="fixed inset-0 sidebar-overlay hidden lg:hidden"></div>

    <div class="flex h-screen overflow-hidden relative">
        
        <!-- [LEFT] Sidebar -->
        <aside id="left-sidebar" class="fixed inset-y-0 left-0 z-50 w-64 lg:static lg:translate-x-0 -translate-x-full sidebar-transition border-r border-gray-200 dark:border-dark-border bg-white dark:bg-dark-sidebar flex flex-col shadow-2xl lg:shadow-none">
            <div class="p-6 h-full flex flex-col overflow-y-auto">
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
                            <i data-lucide="bot"></i>
                        </div>
                        <h1 class="text-xl font-bold tracking-tight">재승's Butler Pro</h1>
                    </div>
                    <button onclick="toggleSidebar('left-sidebar')" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Search -->
                <div class="relative mb-6">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i data-lucide="search" class="w-4 h-4"></i>
                    </span>
                    <input type="text" placeholder="Search..." class="w-full pl-10 pr-4 py-2 bg-gray-100 dark:bg-dark-card border-none rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <!-- Dark Mode Toggle -->
                <button onclick="toggleDarkMode()" class="w-full flex items-center justify-between p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors mb-6">
                    <div class="flex items-center gap-3">
                        <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                        <span class="text-sm font-medium">테마 변경</span>
                    </div>
                    <div id="theme-indicator" class="w-2 h-2 rounded-full bg-blue-500"></div>
                </button>

                <!-- Navigation -->
                <nav class="space-y-1 flex-1">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest px-3 mb-2">Pages</p>
                    <a href="/" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="home" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">Home</span>
                    </a>
                    <a href="/news" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="newspaper" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">News Room</span>
                    </a>
                    <a href="/trains" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="train" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">SRT Reservation</span>
                    </a>
                    <a href="/settlement" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="receipt" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">정산 대시보드</span>
                    </a>
                    <a href="/vwap" class="flex items-center gap-3 p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-dark-card transition-colors group">
                        <i data-lucide="trending-up" class="w-5 h-5 text-gray-500 group-hover:text-blue-500"></i>
                        <span class="text-sm font-medium">VWAP 자동매매</span>
                    </a>
                </nav>

                <div class="p-4 border-t border-gray-200 dark:border-dark-border mt-auto bg-gray-50 dark:bg-dark-card/50 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-blue-500"></div>
                            <div class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-500 border-2 border-white dark:border-dark-sidebar rounded-full"></div>
                        </div>
                        <div>
                            <p class="text-xs font-bold">S9 Server</p>
                            <p class="text-[10px] text-green-500">Active</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- [MIDDLE] Main Content -->
        <main class="flex-1 overflow-y-auto relative bg-white dark:bg-dark-bg w-full">
            <header class="sticky top-0 z-30 glass border-b border-gray-200 dark:border-dark-border px-4 lg:px-8 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar('left-sidebar')" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg lg:hidden">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <h2 class="text-base lg:text-lg font-semibold" id="page-title">{% block page_title %}Dashboard{% endblock %}</h2>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleSidebar('right-sidebar')" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg">
                        <i data-lucide="info" class="w-5 h-5 lg:hidden"></i>
                        <i data-lucide="layout-sidebar-right" class="w-5 h-5 hidden lg:block"></i>
                    </button>
                </div>
            </header>

            <div class="max-w-4xl mx-auto px-4 lg:px-8 py-8 lg:py-12">
                {% block content %}{% endblock %}
            </div>
        </main>

        <!-- [RIGHT] Sidebar -->
        <aside id="right-sidebar" class="fixed inset-y-0 right-0 z-50 w-72 lg:static lg:translate-x-0 translate-x-full sidebar-transition border-l border-gray-200 dark:border-dark-border bg-white dark:bg-dark-sidebar flex flex-col shadow-2xl lg:shadow-none">
            <div class="p-6 h-full flex flex-col overflow-y-auto">
                <div class="flex items-center justify-between mb-8 lg:hidden">
                    <h3 class="font-bold">Info Panel</h3>
                    <button onclick="toggleSidebar('right-sidebar')" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="mb-8">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">Graph View</h3>
                    <div id="graph-view" class="bg-gray-50 dark:bg-dark-card rounded-xl border border-gray-200 dark:border-dark-border">
                        <!-- Vis.js canvas -->
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto">
                    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">On this page</h3>
                    <div id="toc-container" class="space-y-2 text-sm text-gray-500 dark:text-gray-400">
                        <!-- ToC items -->
                        <p class="italic text-xs text-gray-400">No content found</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- [MODAL] Reusable Modal for Management -->
    <div id="common-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white dark:bg-dark-sidebar w-full max-w-md rounded-2xl shadow-2xl border border-gray-200 dark:border-dark-border overflow-hidden transform transition-all">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 id="modal-title" class="text-xl font-bold">제목</h3>
                    <button onclick="closeModal()" class="p-2 hover:bg-gray-100 dark:hover:bg-dark-card rounded-lg transition-colors">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <div id="modal-body" class="space-y-4">
                    <!-- Dynamic Content -->
                </div>
            </div>
            <div id="modal-footer" class="bg-gray-50 dark:bg-dark-card/50 px-6 py-4 flex justify-end gap-3">
                <!-- Dynamic Buttons -->
            </div>
        </div>
    </div>

    <script>
        // Modal Control
        function openModal(title, bodyHtml, footerHtml = '') {
            const modal = document.getElementById('common-modal');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = bodyHtml;
            document.getElementById('modal-footer').innerHTML = footerHtml || `
                <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">닫기</button>
            `;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            if (window.lucide) lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('common-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // API Token for authorized calls
        const BUTLER_API_TOKEN = "{{ api_token }}";

        // 키워드 관리 전역 함수 (그룹핑 관리 추가)
        window.handleManageNews = async function() {
            try {
                // 1. 키워드 및 그룹 정보 병렬 로드
                const [kwRes, groupRes] = await Promise.all([
                    fetch('/api/keywords', { headers: { 'X-Butler-Token': BUTLER_API_TOKEN } }),
                    fetch('/api/keyword_groups', { headers: { 'X-Butler-Token': BUTLER_API_TOKEN } })
                ]);
                
                const kwData = await kwRes.json();
                const groupData = await groupRes.json();
                
                const allKeywords = kwData.keywords || [];
                const groups = groupData.groups || {};
                
                // 역방향 매핑 확인 (이미 그룹에 속한 키워드 제외용)
                const keywordToGroup = {};
                for (const g in groups) {
                    groups[g].forEach(m => keywordToGroup[m.toLowerCase()] = g);
                }

                const bodyHtml = `
                    <div class="space-y-6">
                        <!-- 1. 키워드 추가 -->
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">새 키워드 추가 (Discord 수집용)</label>
                            <div class="flex gap-2">
                                <input type="text" id="new-keyword" placeholder="예: 인공지능" class="flex-1 px-4 py-2 bg-gray-100 dark:bg-dark-card border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                <button onclick="addKeywordAction()" class="px-4 py-2 bg-blue-600 text-white text-sm font-bold rounded-xl hover:bg-blue-700 transition-colors">추가</button>
                            </div>
                        </div>

                        <!-- 2. 그룹 추가 -->
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">새 그룹 생성 (Web 묶어보기용)</label>
                            <div class="flex gap-2">
                                <input type="text" id="new-group-name" placeholder="예: QUANTUM" class="flex-1 px-4 py-2 bg-gray-100 dark:bg-dark-card border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                                <button onclick="addGroupAction()" class="px-4 py-2 bg-green-600 text-white text-sm font-bold rounded-xl hover:bg-green-700 transition-colors">그룹 생성</button>
                            </div>
                        </div>

                        <!-- 3. 계층형 목록 -->
                        <div>
                            <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">키워드 및 그룹 구성</label>
                            <div class="max-h-64 overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                                <!-- Groups -->
                                ${Object.keys(groups).map(g => `
                                    <div class="p-3 bg-blue-50/50 dark:bg-blue-900/10 rounded-xl border border-blue-100 dark:border-blue-800/30">
                                        <div class="flex items-center justify-between mb-2">
                                            <span class="text-sm font-bold text-blue-600 dark:text-blue-400 uppercase">${g}</span>
                                            <button onclick="deleteGroupAction('${g}')" class="p-1 text-gray-400 hover:text-red-500">
                                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                        <div class="flex flex-wrap gap-2">
                                            ${groups[g].map(m => `
                                                <span class="inline-flex items-center gap-1 px-2 py-1 bg-white dark:bg-dark-card rounded-lg text-[11px] border border-blue-200 dark:border-blue-800">
                                                    ${m}
                                                    <button onclick="removeFromGroupAction('${g}', '${m}')" class="text-gray-400 hover:text-red-500">
                                                        <i data-lucide="x" class="w-2.5 h-2.5"></i>
                                                    </button>
                                                </span>
                                            `).join('')}
                                            <select onchange="addToGroupAction('${g}', this.value)" class="px-2 py-1 bg-white dark:bg-dark-card text-[11px] border border-dashed border-gray-300 dark:border-dark-border rounded-lg outline-none cursor-pointer hover:border-blue-500">
                                                <option value="">+ 키워드 연결</option>
                                                ${allKeywords.filter(k => !keywordToGroup[k.toLowerCase()]).map(k => `<option value="${k}">${k}</option>`).join('')}
                                            </select>
                                        </div>
                                    </div>
                                `).join('')}

                                <!-- Unassigned Keywords -->
                                <div>
                                    <p class="text-[10px] font-bold text-gray-400 mb-2">그룹 미지정 키워드</p>
                                    <div class="flex flex-wrap gap-2">
                                        ${allKeywords.filter(k => !keywordToGroup[k.toLowerCase()]).map(kw => `
                                            <div class="flex items-center gap-2 px-3 py-1.5 bg-gray-50 dark:bg-dark-card/50 rounded-xl border border-gray-100 dark:border-dark-border group">
                                                <span class="text-sm font-medium">${kw}</span>
                                                <button onclick="deleteKeywordAction('${kw}')" class="p-1 text-gray-400 hover:text-red-500 transition-colors">
                                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                                </button>
                                            </div>
                                        `).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                openModal('키워드 및 그룹 관리', bodyHtml);
            } catch (e) {
                alert("정보를 불러오는데 실패했습니다.");
            }
        };

        window.addGroupAction = async function() {
            const input = document.getElementById('new-group-name');
            const group_name = input.value.trim();
            if (!group_name) return;

            try {
                const res = await fetch('/api/keyword_groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Butler-Token': BUTLER_API_TOKEN },
                    body: JSON.stringify({ group_name, members: [] })
                });
                if ((await res.json()).status === 'success') {
                    input.value = '';
                    handleManageNews();
                    if (typeof initGraph === 'function') initGraph();
                }
            } catch (e) { alert("연결 에러"); }
        };

        window.deleteGroupAction = async function(group_name) {
            if (!confirm(`'${group_name}' 그룹을 삭제하시겠습니까? (키워드는 삭제되지 않습니다)`)) return;
            try {
                const res = await fetch('/api/keyword_groups', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'X-Butler-Token': BUTLER_API_TOKEN },
                    body: JSON.stringify({ group_name })
                });
                if ((await res.json()).status === 'success') {
                    handleManageNews();
                    if (typeof initGraph === 'function') initGraph();
                }
            } catch (e) { alert("연결 에러"); }
        };

        window.addToGroupAction = async function(group_name, keyword) {
            if (!keyword) return;
            try {
                // 1. 기존 그룹 정보 로드
                const gRes = await fetch('/api/keyword_groups', { headers: { 'X-Butler-Token': BUTLER_API_TOKEN } });
                const gData = await gRes.json();
                const members = gData.groups[group_name] || [];
                if (!members.includes(keyword)) {
                    members.push(keyword);
                    const res = await fetch('/api/keyword_groups', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'X-Butler-Token': BUTLER_API_TOKEN },
                        body: JSON.stringify({ group_name, members })
                    });
                    if ((await res.json()).status === 'success') {
                        handleManageNews();
                        if (typeof initGraph === 'function') initGraph();
                    }
                }
            } catch (e) { alert("연결 에러"); }
        };

        window.removeFromGroupAction = async function(group_name, keyword) {
            try {
                const gRes = await fetch('/api/keyword_groups', { headers: { 'X-Butler-Token': BUTLER_API_TOKEN } });
                const gData = await gRes.json();
                let members = gData.groups[group_name] || [];
                members = members.filter(m => m !== keyword);
                const res = await fetch('/api/keyword_groups', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-Butler-Token': BUTLER_API_TOKEN },
                    body: JSON.stringify({ group_name, members })
                });
                if ((await res.json()).status === 'success') {
                    handleManageNews();
                    if (typeof initGraph === 'function') initGraph();
                }
            } catch (e) { alert("연결 에러"); }
        };

        window.addKeywordAction = async function() {
            const input = document.getElementById('new-keyword');
            const keyword = input.value.trim();
            if (!keyword) return;

            try {
                const res = await fetch('/api/keywords', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Butler-Token': BUTLER_API_TOKEN 
                    },
                    body: JSON.stringify({ keyword })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    input.value = '';
                    handleManageNews(); // UI 갱신
                    if (typeof initGraph === 'function') initGraph();
                } else {
                    alert("추가 실패: " + (result.reason || "알 수 없는 오류"));
                }
            } catch (e) { alert("서버 연결 에러"); }
        };

        window.deleteKeywordAction = async function(keyword) {
            if (!confirm(`'${keyword}' 키워드를 삭제하시겠습니까?`)) return;

            try {
                const res = await fetch('/api/keywords', {
                    method: 'DELETE',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Butler-Token': BUTLER_API_TOKEN 
                    },
                    body: JSON.stringify({ keyword })
                });
                const result = await res.json();
                if (result.status === 'success') {
                    handleManageNews(); // UI 갱신
                    if (typeof initGraph === 'function') initGraph();
                } else {
                    alert("삭제 실패: " + (result.reason || "알 수 없는 오류"));
                }
            } catch (e) { alert("서버 연결 에러"); }
        };

        // Init Lucide Icons
        lucide.createIcons();

        // Dark Mode Logic
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        if (localStorage.getItem('theme') === 'dark' || 
            (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Sidebar Control
        function toggleSidebar(id) {
            const sidebar = document.getElementById(id);
            const overlay = document.getElementById('sidebar-overlay');
            const isLeft = id === 'left-sidebar';
            const isOpen = !sidebar.classList.contains(isLeft ? '-translate-x-full' : 'translate-x-full');

            if (isOpen) {
                sidebar.classList.add(isLeft ? '-translate-x-full' : 'translate-x-full');
                overlay.classList.add('hidden');
                document.body.classList.remove('overflow-hidden');
            } else {
                if (window.innerWidth < 1024) {
                    closeAllSidebars();
                }
                sidebar.classList.remove(isLeft ? '-translate-x-full' : 'translate-x-full');
                overlay.classList.remove('hidden');
                document.body.classList.add('overflow-hidden');
            }
        }

        function closeAllSidebars() {
            document.getElementById('left-sidebar').classList.add('-translate-x-full');
            document.getElementById('right-sidebar').classList.add('translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        // TOC Generator (Default)
        function generateDefaultTOC() {
            const tocContainer = document.getElementById('toc-container');
            if (tocContainer && tocContainer.getAttribute('data-custom') === 'true') return;

            const content = document.querySelector('main div');
            const headings = content.querySelectorAll('h2, h3');
            
            if (tocContainer && headings.length > 0) {
                tocContainer.innerHTML = '';
                headings.forEach((h, index) => {
                    if (!h.id) h.id = 'heading-' + index;
                    const item = document.createElement('a');
                    item.href = '#' + h.id;
                    item.className = 'block hover:text-blue-500 transition-colors py-1 text-sm text-gray-500 dark:text-gray-400 pl-' + (h.tagName[1] === '3' ? '4' : '0');
                    item.innerText = h.innerText;
                    tocContainer.appendChild(item);
                });
            }
        }

        // Graph View
        async function initGraph() {
            const container = document.getElementById('graph-view');
            if (!container) return;
            try {
                const res = await fetch('/api/graph_data', {
                    headers: { 'X-Butler-Token': BUTLER_API_TOKEN }
                });
                const data = await res.json();
                const options = {
                    nodes: { shape: 'dot', size: 16, font: { size: 10, color: '#999' }, borderWidth: 2 },
                    edges: { width: 1, color: '#ccc' },
                    physics: { enabled: true, stabilization: { iterations: 150 } }
                };
                new vis.Network(container, { nodes: new vis.DataSet(data.nodes), edges: new vis.DataSet(data.edges) }, options);
            } catch (e) { console.error("Graph load failed", e); }
        }

        window.onload = () => {
            updateStatus(); // 상태 정보 먼저 호출
            generateDefaultTOC();
            if (window.innerWidth >= 1024) {
                document.getElementById('left-sidebar').classList.remove('-translate-x-full');
                document.getElementById('right-sidebar').classList.remove('translate-x-full');
            }
            // 그래프 뷰는 부하가 크므로 약간의 지연 후 실행
            setTimeout(initGraph, 1000); 
        };

        window.onresize = () => {
            if (window.innerWidth >= 1024) {
                document.getElementById('left-sidebar').classList.remove('-translate-x-full');
                document.getElementById('right-sidebar').classList.remove('translate-x-full');
                document.getElementById('sidebar-overlay').classList.add('hidden');
            } else {
                closeAllSidebars();
            }
        };
    </script>
</body>
</html>
