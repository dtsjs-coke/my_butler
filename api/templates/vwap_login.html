<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VWAP BOT - Admin Login</title>
    <!-- Google Fonts Outfit & Noto Sans KR -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-blue: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.35);
            --accent-red: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* 배경 데코레이션 그라디언트 구체 */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            right: -100px;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            left: -150px;
            z-index: 0;
        }

        .login-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            z-index: 10;
            position: relative;
            text-align: center;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-area {
            margin-bottom: 30px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 18px;
            color: #fff;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 40%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="password"] {
            width: 100%;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            outline: none;
            color: var(--text-primary);
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="password"]:focus {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5);
            background: linear-gradient(135deg, #4f46e5 0%, #3b82f6 100%);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-message {
            color: var(--accent-red);
            font-size: 13px;
            font-weight: 500;
            margin-top: 15px;
            opacity: 0;
            height: 18px;
            transition: opacity 0.3s ease;
        }

        .error-message.visible {
            opacity: 1;
        }

        .footer-text {
            margin-top: 40px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon">V</div>
            <h1>LIMIT VWAP BOT</h1>
            <p class="subtitle">보안 구역 - 관리자 비밀번호를 입력하십시오.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label for="password">Security Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-submit">인증 및 대시보드 진입</button>
            <div id="errorMsg" class="error-message">비밀번호가 올바르지 않습니다.</div>
        </form>

        <p class="footer-text">S9 Butler Autonomous System © 2026</p>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const passwordInput = document.getElementById('password');
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = document.querySelector('.btn-submit');
            
            errorMsg.classList.remove('visible');
            submitBtn.disabled = true;
            submitBtn.textContent = "인증 검증 중...";

            try {
                const response = await fetch('/vwap/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: passwordInput.value })
                });

                if (response.ok) {
                    // 로그인 성공 시 쿠키가 세팅되므로 바로 홈 리로드
                    window.location.reload();
                } else {
                    errorMsg.classList.add('visible');
                    passwordInput.value = "";
                    passwordInput.focus();
                }
            } catch (err) {
                console.error("인증 실패:", err);
                errorMsg.textContent = "네트워크 오류가 발생했습니다.";
                errorMsg.classList.add('visible');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "인증 및 대시보드 진입";
            }
        }
    </script>
</body>
</html>
